name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  POETRY_VERSION: 1.8.5
  # pipx runs Poetry under the runner's system Python; without this Poetry
  # builds the venv from its own interpreter and ignores actions/setup-python.
  POETRY_VIRTUALENVS_PREFER_ACTIVE_PYTHON: "true"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      # Poetry must exist before setup-python so cache: poetry can locate
      # its virtualenvs directory (keyed on poetry.lock + python version).
      - name: Install pinned Poetry
        run: pipx install "poetry==${POETRY_VERSION}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry
      - name: Verify lockfile
        run: poetry check --lock
      - name: Install locked dependencies
        run: poetry install --sync --no-interaction
      - name: Run fast suite
        run: >-
          poetry run python -m pytest cje/tests
          -m "not slow"
          --cov=cje
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=85

  quality:
    name: Format and types
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # Poetry must exist before setup-python so cache: poetry can locate
      # its virtualenvs directory (keyed on poetry.lock + python version).
      - name: Install pinned Poetry
        run: pipx install "poetry==${POETRY_VERSION}"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: poetry
      - name: Verify lockfile
        run: poetry check --lock
      - name: Install locked dependencies
        run: poetry install --sync --no-interaction
      - name: Check formatting
        run: poetry run black --check cje
      - name: Check types
        run: poetry run mypy cje
